name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build (debug)
        run: swift build

      - name: Build (release, arm64)
        run: swift build -c release --arch arm64

      - name: Smoke check binary
        run: |
          BIN=".build/arm64-apple-macosx/release/Matador"
          [ -x "$BIN" ] || { echo "::error::binary missing"; exit 1; }
          file "$BIN"
          du -h "$BIN"
